<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Fusion</title>
    <style>
        /* Tam ekran yerleşimi */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Kaydırma çubuğunu engeller */
        }

        /* Arka plan rengi (#014225) ve logonun tam ortalanması */
        body {
            background-color: #014225;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo ayarları */
        img {
            max-width: 60%; /* Logonun büyüklüğünü buradan ayarlayabilirsin */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Heritage Fusion">
</body>
</html>
