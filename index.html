<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Fusion</title>
    <style>
        /* Base page setup */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #014225; /* Fallback color */
        }

        /* The Background Layer */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Replace 'background.jpg' with your image name in GitHub */
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            /* BLUR EFFECT: Adjust '8px' to make it more or less blurry */
            filter: blur(8px);
            /* Scale it slightly so the edges don't show white gaps while blurring */
            transform: scale(1.1);
            z-index: 1;
        }

        /* Dark overlay to make the logo pop */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Darkens the background */
            z-index: 2;
        }

        /* Center container for the logo */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Logo settings */
        img {
            max-width: 60%;
            height: auto;
            display: block;
            /* Ensures logo remains sharp regardless of background blur */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="overlay"></div>

    <div class="content">
        <img src="logo.png" alt="Heritage Fusion">
    </div>

</body>
</html>
