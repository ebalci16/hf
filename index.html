<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Fusion</title>
    <style>
        /* Ensures the background covers the entire screen without gaps */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Disables scrolling */
        }

        /* Set the background color to match your logo precisely */
        body {
            background-color: #014225; /* Your specific green code */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo sizing and display */
        img {
            max-width: 60%; /* You can adjust this to make the logo larger or smaller */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Heritage Fusion Logo">
</body>
</html>
